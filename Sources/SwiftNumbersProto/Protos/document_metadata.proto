syntax = "proto3";

package swiftnumbers;

message DocumentMetadata {
  string document_id = 1;
  repeated SheetMetadata sheets = 2;
}

message SheetMetadata {
  string sheet_id = 1;
  string name = 2;
  repeated TableMetadata tables = 3;
}

message TableMetadata {
  string table_id = 1;
  string name = 2;
  uint32 row_count = 3;
  uint32 column_count = 4;
  repeated MergeRange merges = 5;
  repeated Cell cells = 6;
}

message MergeRange {
  uint32 start_row = 1;
  uint32 end_row = 2;
  uint32 start_column = 3;
  uint32 end_column = 4;
}

message Cell {
  uint32 row = 1;
  uint32 column = 2;

  oneof value {
    string string_value = 3;
    double number_value = 4;
    bool bool_value = 5;
  }

  CellStyle style = 6;
}

message CellStyle {
  optional string horizontal_alignment = 1;
  optional string vertical_alignment = 2;
  optional string background_color_hex = 3;
  optional string font_name = 4;
  optional double font_size = 5;
  optional bool is_bold = 6;
  optional bool is_italic = 7;
  optional string text_color_hex = 8;
  optional bool top_border = 9;
  optional bool right_border = 10;
  optional bool bottom_border = 11;
  optional bool left_border = 12;
  optional string number_format_kind = 13;
  optional int32 number_format_id = 14;
}
