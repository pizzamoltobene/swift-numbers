name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build-test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test --enable-code-coverage

      - name: Coverage Summary
        run: ./scripts/coverage-summary.sh

  quality:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint (warnings as errors)
        run: ./scripts/ci-lint.sh

      - name: Format Check
        run: ./scripts/ci-format-check.sh
