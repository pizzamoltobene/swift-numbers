name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Swift Version
        run: swift --version
      - name: Format Check
        run: ./scripts/ci-format-check.sh

  lint-build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Swift Version
        run: swift --version
      - name: Lint and Build
        run: ./scripts/ci-lint.sh

  tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Swift Version
        run: swift --version
      - name: Run Tests
        run: swift test --enable-code-coverage

  coverage-summary:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Swift Version
        run: swift --version
      - name: Coverage Gate
        run: ./scripts/coverage-summary.sh --threshold 70
