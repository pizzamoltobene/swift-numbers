name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Format Check
        run: |
          set -euo pipefail
          if swift format --help >/dev/null 2>&1; then
            swift format lint --strict --recursive Sources Tests Package.swift
          elif command -v swift-format >/dev/null 2>&1; then
            swift-format lint --strict --recursive Sources Tests Package.swift
          else
            echo "Neither 'swift format' nor 'swift-format' is available in this toolchain"
            exit 1
          fi

  lint-build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Lint and Build
        run: swift build -Xswiftc -warnings-as-errors

  tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Run Tests
        run: swift test --enable-code-coverage
      - name: Test Growth Report
        run: |
          set -euo pipefail
          declared_count="$(find Tests/SwiftNumbersTests -name '*.swift' -print0 | xargs -0 grep -Eho 'func test[A-Za-z0-9_]+' | wc -l | tr -d ' ')"
          echo "Declared XCTest cases: $declared_count"
          echo "Target declared test count: 1000"

  coverage-summary:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Coverage Gate
        run: |
          set -euo pipefail
          PROFILE_DIR="$(mktemp -d "${TMPDIR:-/tmp}/swiftnumbers-profiles.XXXXXX")"
          export LLVM_PROFILE_FILE="$PROFILE_DIR/%p.profraw"
          swift test --enable-code-coverage

          if ! find "$PROFILE_DIR" -type f -name '*.profraw' -size +0c | grep -q .; then
            echo "No non-empty LLVM profile files were generated in $PROFILE_DIR"
            exit 1
          fi

          CODECOV_JSON_PATH="$(swift test --show-codecov-path | tail -n 1)"
          if [[ ! -f "$CODECOV_JSON_PATH" ]]; then
            echo "Code coverage JSON path not found: $CODECOV_JSON_PATH"
            exit 1
          fi

          echo "Coverage JSON: $CODECOV_JSON_PATH"
          swift - "$CODECOV_JSON_PATH" 70 <<'SWIFT'
          import Foundation
          import Darwin

          func fail(_ message: String) -> Never {
            fputs("\(message)\n", stderr)
            Darwin.exit(1)
          }

          func intValue(_ raw: Any?) -> Int {
            if let intValue = raw as? Int {
              return intValue
            }
            if let numberValue = raw as? NSNumber {
              return numberValue.intValue
            }
            return 0
          }

          let args = CommandLine.arguments
          guard args.count >= 3 else {
            fail("Expected arguments: <coverage-json-path> <threshold>")
          }

          let path = args[1]
          guard let threshold = Double(args[2]) else {
            fail("Invalid threshold value: \(args[2])")
          }

          let url = URL(fileURLWithPath: path)
          let data: Data
          do {
            data = try Data(contentsOf: url)
          } catch {
            fail("Failed to read coverage JSON at \(path): \(error)")
          }

          let rootObject: Any
          do {
            rootObject = try JSONSerialization.jsonObject(with: data)
          } catch {
            fail("Failed to parse coverage JSON at \(path): \(error)")
          }

          guard
            let payload = rootObject as? [String: Any],
            let dataArray = payload["data"] as? [[String: Any]],
            let firstEntry = dataArray.first
          else {
            fail("No coverage data found")
          }

          let totals = (firstEntry["totals"] as? [String: Any])?["lines"] as? [String: Any] ?? [:]
          let totalCovered = intValue(totals["covered"])
          let totalCount = intValue(totals["count"])
          let totalPct = totalCount > 0 ? (Double(totalCovered) / Double(totalCount) * 100.0) : 0.0
          print("All code line coverage: \(totalCovered)/\(totalCount) (\(String(format: "%.2f", totalPct))%)")

          let firstPartyPrefixes = [
            "/Sources/SwiftNumbers",
            "/Sources/swiftnumbers/",
            "/Tests/SwiftNumbersTests/",
          ]

          var firstCovered = 0
          var firstCount = 0

          let files = firstEntry["files"] as? [[String: Any]] ?? []
          for fileEntry in files {
            let filename = fileEntry["filename"] as? String ?? ""
            guard firstPartyPrefixes.contains(where: { filename.contains($0) }) else {
              continue
            }

            let lines = ((fileEntry["summary"] as? [String: Any])?["lines"] as? [String: Any]) ?? [:]
            firstCovered += intValue(lines["covered"])
            firstCount += intValue(lines["count"])
          }

          guard firstCount > 0 else {
            fail("No first-party coverage entries found.")
          }

          let firstPct = Double(firstCovered) / Double(firstCount) * 100.0
          print("First-party line coverage: \(firstCovered)/\(firstCount) (\(String(format: "%.2f", firstPct))%)")
          print("First-party coverage threshold: \(String(format: "%.2f", threshold))%")

          if firstPct < threshold {
            fail("Coverage gate failed: first-party coverage \(String(format: "%.2f", firstPct))% is below threshold \(String(format: "%.2f", threshold))%")
          }
          SWIFT
