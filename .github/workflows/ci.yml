name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Format Check
        run: ./scripts/ci-format-check.sh

  lint-build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Lint and Build
        run: ./scripts/ci-lint.sh

  tests:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Run Tests
        run: swift test --enable-code-coverage

  coverage-summary:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Coverage Gate
        run: ./scripts/coverage-summary.sh --threshold 70
