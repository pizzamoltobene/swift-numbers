name: Testing Autopilot

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

jobs:
  testing-growth:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_APP="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1 || true)"
          if [[ -z "$XCODE_APP" ]]; then
            echo "No Xcode 16.x installation found on runner"
            ls -1 /Applications | grep -E '^Xcode' || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version
      - name: Swift Version
        run: swift --version
      - name: Record External Backlog Note
        run: |
          mkdir -p .local
          echo "Backlog synthesis tooling lives outside the package repository." > .local/testing-backlog-preview.md
      - name: Run Test Growth Report
        run: |
          set -euo pipefail
          mkdir -p .local
          swift test > .local/swift-test-output.txt 2>&1
          declared_count="$(find Tests/SwiftNumbersTests -name '*.swift' -print0 | xargs -0 grep -Eho 'func test[A-Za-z0-9_]+' | wc -l | tr -d ' ')"
          {
            echo "Declared XCTest cases: $declared_count"
            echo "Target declared test count: 1000"
            tail -n 40 .local/swift-test-output.txt
          } > .local/test-growth-report.txt
      - name: Upload Testing Reports
        uses: actions/upload-artifact@v4
        with:
          name: testing-autopilot-reports
          path: |
            .local/testing-backlog-preview.md
            .local/test-growth-report.txt
